spring:
  application:
    name: storyline-school-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/storyline_school}
    username: ${SPRING_DATASOURCE_USERNAME:appuser}
    password: ${SPRING_DATASOURCE_PASSWORD:apppass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

app:
  security:
    jwt:
      issuer: storyline-school-api
      secret: ${JWT_SECRET:change-this-development-secret-change-this-development-secret}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
